<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outlook Test Add-in</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f3f2f1;
      color: #323130;
    }

    .box {
      background: #ffffff;
      border: 1px solid #d1d1d1;
      border-radius: 8px;
      padding: 20px;
      max-width: 600px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      line-height: 1.5;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Test-Add-in</h1>
    <p>Hallo Matthias, dieses Outlook-Add-in funktioniert.</p>
  </div>
</body>
</html>
